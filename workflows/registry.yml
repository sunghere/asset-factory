# ComfyUI 워크플로우 레지스트리
#
# 카테고리 → 변형(variant) → 워크플로우 API JSON 파일 매핑.
# asset-factory 가 ComfyUI 백엔드를 호출할 때 어느 워크플로우를 로드할지,
# 어떤 노드를 어떤 키로 patch 할지, 결과 어디서 가져올지를 정의한다.
#
# 패치 대상 노드는 `class_type` + (선택) `title_match` 로 검색하므로
# 노드 ID 가 변해도 작동한다. (HANDOFF §4 권장 패턴)
#
# `status: needs_api_conversion` 인 변형은 ComfyUI UI 포맷만 있어 호출 불가.
# 사용자가 ComfyUI 에서 "API 포맷 저장" 으로 export 후 file 경로를 채우면 활성화된다.

version: 1

# ---- 공통 noise/negative 프리셋 (선택) ---------------------------------------
# variant.defaults 에서 ${preset:NEG_PIXEL_SPRITE} 같이 참조 가능 (로더가 치환).
presets:
  NEG_PIXEL_SPRITE: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, photorealistic, 3d, realistic, photo,
    smooth shading, anti-aliasing, smooth lines, blurred edges,
    gradient background, complex background, scenery,
    different sizes, varying scale, oversized character, height variation,
    close-up, upper body, portrait, cropped character, headshot,
    floating sword, detached weapon, levitating sword, separated weapon,
    sword in air, weapon hovering, weapon next to character, disembodied weapon
  NEG_ILLUSTRATION: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, extra fingers, mutated hands

# ---- 디스커버리 메타 anchor (변형 간 공유) ----------------------------------
# 같은 워크플로우 family 의 변형들은 prompt_template / pitfalls 를 공유.
# 변형마다 다른 메타 (use_cases / not_for / cost / related) 는 변형 내부에 직접 작성.
# 로더는 _anchors 키를 무시 — yaml anchor expansion 만 활용.
_anchors:

  # ===== sprite V37/V38 (ControlNet OpenPose, pixel_character_sprite_illustrious LoRA) =====
  sprite_pose_prompt_template: &sprite_pose_prompt_template
    skeleton: |
      {gender_count}, {hair_features}, {outfit_features},
      {pose_or_action}, {scene_qualifiers},
      masterpiece, best quality, very aesthetic
    model_triggers:
      # pixel_character_sprite_illustrious LoRA 트리거 (LoRA 노드는 워크플로우에
      # 박혀 있어 <lora:...> syntax 는 불필요 — 트리거 단어만 prompt 에 포함)
      - "pixel_character_sprite, sprite, sprite sheet, (pixel art:1.5), white background"
    required_tokens:
      - { placeholder: "{gender_count}", examples: ["1girl", "1boy", "1other"] }
      - placeholder: "{hair_features}"
        examples:
          - "(black hair:1.2), (side ponytail:1.3), long hair"
          - "(silver hair:1.2), short hair, twintails"
      - placeholder: "{outfit_features}"
        examples:
          - "blue knight armor, red cape"
          - "white wizard robe, pointed hat"
          - "leather rogue outfit, hooded cloak"
      - placeholder: "{pose_or_action}"
        examples:
          - "(holding silver sword:1.3), sword in right hand, gripping sword tightly"
          - "casting spell, holding wooden staff"
          - "drawing bow, arrow nocked"
      - placeholder: "{scene_qualifiers}"
        examples: ["fantasy warrior", "fantasy mage", "fantasy archer"]
    forbidden_tokens:
      - token: "(chibi:1.4)"
        reason: "ControlNet stick figure 가 등신 결정. 강한 chibi 가중치는 비율 과적용·깨짐 (HANDOFF §5.2/5.5). chibi 단어 자체는 약하게 OK"
      - token: "(chibi:1.5)"
        reason: "(chibi:1.4) 와 동일 — 가중치 강조 금지"
      - token: "background, scenery"
        reason: "흰배경 강제 워크플로우 — scenery 가 들어가면 배경 노이즈 + alpha 추출 실패"
      - token: "close-up, upper body, portrait, headshot"
        reason: "1×3 full body multi-view 와 충돌 — 잘림 발생"
      - token: "floating sword, detached weapon"
        reason: "negative 에 이미 8개 키워드로 박혀있음 — positive 에 넣으면 무력화"
    examples:
      - prompt: |
          1girl, (black hair:1.2), (side ponytail:1.3), long hair,
          hair tied at side, medium height ponytail,
          blue knight armor, (holding silver sword:1.3), sword in right hand,
          gripping sword tightly, red cape, fantasy warrior,
          masterpiece, best quality, very aesthetic
        seed: 42
        note: "HANDOFF §1.1 메인 검증 캐릭터 — 검 떠다님 해결된 정형 prompt"

  sprite_pose_pitfalls: &sprite_pose_pitfalls
    - "검 든 캐릭터: (holding silver sword:1.3) + sword in right hand + gripping sword tightly 동사 묶기 필수. negative 의 floating sword 8개 키워드와 세트 (HANDOFF §5.4)"
    - "좌측 view 는 게임 엔진에서 flipX 권장 — SDXL/Illustrious 가 좌측 옆모습 학습 약함 (HANDOFF §5.3)"
    - "chibi 강조 가중치 금지 — ControlNet stick figure 가 비율 결정. 'chibi, sd character' 정도만 (HANDOFF §5.2)"
    - "WAS rembg 노드 mode 라벨 직관 반대 — 'foreground' 가 흰배경 alpha 처리. 워크플로우엔 이미 정확히 박혀있음 (HANDOFF §5.1)"

  sprite_pose_proportions: &sprite_pose_proportions
    head_ratio: 2.5
    view_count: 3
    layout: front-rightside-back
    chibi: true

  # ===== sprite V36 Pro (ControlNet 없음, 자유 layout, 컨셉 디자인용) =====
  sprite_v36_pro_prompt_template: &sprite_v36_pro_prompt_template
    skeleton: |
      {gender_count}, {hair_features}, {outfit_features},
      {pose_or_action}, {scene_qualifiers}, full body,
      masterpiece, best quality, very aesthetic
    model_triggers:
      - "pixel_character_sprite, sprite art, (pixel art:1.5), white background, chibi, sd character"
    required_tokens:
      - { placeholder: "{gender_count}", examples: ["1girl", "1boy", "1other"] }
      - placeholder: "{hair_features}"
        examples: ["(black hair:1.2), short hair", "(silver hair:1.2), long hair, ponytail"]
      - placeholder: "{outfit_features}"
        examples: ["knight armor, red cape", "wizard robe, pointed hat"]
      - placeholder: "{pose_or_action}"
        examples: ["standing, hands on hips", "holding sword", "casting spell"]
      - placeholder: "{scene_qualifiers}"
        examples: ["fantasy warrior, simple pose", "fantasy mage"]
    forbidden_tokens:
      - token: "background, scenery"
        reason: "흰배경 강제 — scenery 가 들어가면 배경 노이즈"
      - token: "(chibi:1.4)"
        reason: "강한 chibi 가중치는 LoRA 와 과적용. 'chibi, sd character' 정도가 적정"
    examples:
      - prompt: |
          1girl, (black hair:1.2), (side ponytail:1.3), long hair,
          blue knight armor, holding sword, fantasy warrior,
          chibi, sd character, full body,
          masterpiece, best quality, very aesthetic
        note: "V36 Pro 컨셉 디자인 — 자유 layout (멀티뷰 강제 없음)"

  sprite_v36_pro_pitfalls: &sprite_v36_pro_pitfalls
    - "V37/V38 와 달리 ControlNet 없음 — 등신·layout 자유. 다양한 디자인 탐색용"
    - "chibi 강조 가중치 금지 — LoRA 가 약하게 비율 학습 (HANDOFF §5.5)"
    - "결과를 V37/V38 에 그대로 못 씀 — sprite/pose_extract 로 stick figure 추출 후 ControlNet 단계로 (HANDOFF §5.6)"

  # ===== illustration 모델별 prompt template =====
  illust_animagine_prompt_template: &illust_animagine_prompt_template
    skeleton: |
      {subject}, {style_qualifiers},
      masterpiece, best quality, very aesthetic, absurdres
    model_triggers: []   # animagine 은 별도 트리거 불필요
    required_tokens:
      - placeholder: "{subject}"
        examples:
          - "1girl, silver hair, blue dress, sitting on flower field"
          - "1boy, black coat, holding sword, fantasy knight"
          - "fantasy castle, sunset, dramatic lighting"
      - placeholder: "{style_qualifiers}"
        examples: ["soft lighting, detailed", "cinematic, vibrant colors", "anime style, clean lines"]
    forbidden_tokens: []
    examples:
      - prompt: "1girl, silver hair, blue dress, sitting on flower field, soft lighting, masterpiece, best quality, very aesthetic, absurdres"
        note: "animagine 표준 — 깔끔한 anime 일러스트"

  illust_pony_prompt_template: &illust_pony_prompt_template
    skeleton: |
      score_9, score_8_up, score_7_up,
      {subject}, {style_qualifiers},
      masterpiece, best quality
    model_triggers:
      # Pony 정통: score_9 트리거 prefix 가 거의 필수 (Pony tagger 학습)
      - "score_9, score_8_up, score_7_up"
    required_tokens:
      - placeholder: "{subject}"
        examples:
          - "1girl, blue hair, school uniform"
          - "1boy, dragon companion, fantasy warrior"
      - placeholder: "{style_qualifiers}"
        examples: ["soft lighting, anime style", "detailed background, vibrant"]
    forbidden_tokens:
      - token: "score_3, score_4, score_5, score_6"
        reason: "Pony 의 negative 트리거 — positive 에 들어가면 품질 폭락"
    examples:
      - prompt: "score_9, score_8_up, score_7_up, 1girl, blue hair, school uniform, anime style, masterpiece, best quality"
        note: "Pony 정통 — score_9 prefix 필수"

  illust_hyphoria_prompt_template: &illust_hyphoria_prompt_template
    skeleton: |
      {subject}, {style_qualifiers},
      masterpiece, best quality, very aesthetic
    model_triggers: []
    required_tokens:
      - placeholder: "{subject}"
        examples: ["1girl, modern outfit", "fantasy landscape, mountains"]
      - placeholder: "{style_qualifiers}"
        examples: ["modern illustration, soft shading", "detailed, vibrant"]
    forbidden_tokens: []
    examples:
      - prompt: "1girl, modern outfit, modern illustration, soft shading, masterpiece, best quality, very aesthetic"
        note: "Hyphoria — Modern Illustrious 베이스 (sprite 와 같은 ckpt 지만 LoRA 없이 일러스트용)"

  illust_anything_prompt_template: &illust_anything_prompt_template
    skeleton: |
      {subject}, {style_qualifiers},
      masterpiece, best quality
    model_triggers: []
    required_tokens:
      - placeholder: "{subject}"
        examples: ["1girl, casual outfit, smile", "fantasy character, detailed"]
      - placeholder: "{style_qualifiers}"
        examples: ["anime style", "soft lighting"]
    forbidden_tokens: []
    examples:
      - prompt: "1girl, casual outfit, smile, anime style, masterpiece, best quality"
        note: "AnythingXL — 범용 anime"

  illust_meinamix_prompt_template: &illust_meinamix_prompt_template
    skeleton: |
      {subject}, {style_qualifiers},
      masterpiece, best quality
    model_triggers: []
    required_tokens:
      - placeholder: "{subject}"
        examples: ["1girl, anime style, portrait", "fantasy character"]
      - placeholder: "{style_qualifiers}"
        examples: ["soft anime, detailed eyes", "vibrant colors"]
    forbidden_tokens: []
    examples:
      - prompt: "1girl, anime style, portrait, soft anime, detailed eyes, masterpiece, best quality"
        note: "MeinaMix — SD1.5 빠른 anime"

  # ===== pixel_bg (픽셀 배경/타일) =====
  pixel_bg_sdxl_prompt_template: &pixel_bg_sdxl_prompt_template
    skeleton: |
      pixel art, {scene}, {atmosphere}, {detail_qualifiers}
    model_triggers:
      # PixelDiffusionXL spriteShaper 가 base — pixel art 트리거 + LoRA 보강
      - "pixel art"
    required_tokens:
      - placeholder: "{scene}"
        examples:
          - "fantasy forest, ancient ruins"
          - "medieval town square, market stalls"
          - "underground cave, glowing crystals"
      - placeholder: "{atmosphere}"
        examples: ["sunset golden hour", "moonlit night, stars", "rainy day, mist"]
      - placeholder: "{detail_qualifiers}"
        examples: ["highly detailed, retro game", "16-bit aesthetic", "colorful, vibrant"]
    forbidden_tokens:
      - token: "1girl, 1boy, character, portrait"
        reason: "배경 워크플로우 — 캐릭터 들어가면 비율·구도 깨짐. 캐릭터 sprite 는 sprite/* 사용"
    examples:
      - prompt: "pixel art, fantasy forest, ancient ruins, sunset golden hour, highly detailed, retro game"
        note: "PixelDiffusionXL — 환경 자산"

  pixel_bg_pony_prompt_template: &pixel_bg_pony_prompt_template
    skeleton: |
      score_9, score_8_up, score_7_up,
      pixel art, game assets, overworld, {scene}, {atmosphere}
    model_triggers:
      # RDXL Pixel Art Pony2 + Fnaf_into_the_Pit LoRA — score_9 prefix + LoRA 의
      # trained_words 3종 (pixel art / game assets / overworld) 모두 포함.
      # sd_catalog: fnaf_into_the_pit__style.civitai.trained_words 와 일치.
      - "score_9, score_8_up, score_7_up, pixel art, game assets, overworld"
    required_tokens:
      - placeholder: "{scene}"
        examples:
          - "horror corridor, fluorescent lights"
          - "abandoned arcade, neon signs"
          - "haunted mansion interior"
      - placeholder: "{atmosphere}"
        examples: ["dim lighting, eerie", "fnaf style, retro horror"]
    forbidden_tokens:
      - token: "score_3, score_4, score_5, score_6"
        reason: "Pony negative 트리거 — positive 금지"
      - token: "1girl, 1boy, character, animatronic"
        reason: "배경/오버월드 전용 — 캐릭터 키워드는 구도 깨짐"
    examples:
      - prompt: "score_9, score_8_up, score_7_up, pixel art, game assets, horror corridor, fluorescent lights, fnaf style, retro horror"
        note: "RDXL Pony pixel + Fnaf LoRA — 호러 픽셀 환경"

  # ===== icon =====
  icon_flat_prompt_template: &icon_flat_prompt_template
    skeleton: |
      {subject_icon}, {style_qualifiers},
      flat design, simple background, masterpiece, best quality
    model_triggers: []
    required_tokens:
      - placeholder: "{subject_icon}"
        examples:
          - "shield icon, blue and silver"
          - "sword icon, golden hilt"
          - "potion bottle, red liquid"
          - "compass icon, brass"
      - placeholder: "{style_qualifiers}"
        examples: ["clean lines, minimal", "vector style, bold colors", "game UI icon"]
    forbidden_tokens:
      - token: "complex background, scenery"
        reason: "icon 워크플로우 — 알파 추출 위해 단순 배경 강제 (WAS rembg)"
    examples:
      - prompt: "shield icon, blue and silver, clean lines, minimal, flat design, simple background, masterpiece, best quality"
        note: "앱 UI 아이콘 — alpha 추출 (WAS) 동시"

# ---- 카테고리 ---------------------------------------------------------------
categories:

  # =========================================================================
  # SPRITE — 게임 캐릭터 (1×3 multi-view, ControlNet OpenPose, 픽셀화/알파)
  # =========================================================================
  sprite:
    description: |
      게임용 픽셀 캐릭터 스프라이트. V38 Alpha 가 메인 라인업이고,
      V37 은 ControlNet 단계, V36 Pro 는 컨셉 디자인 단계.

    variants:

      # --- V38 Alpha (메인) -----------------------------------------------
      pixel_alpha:
        description: "픽셀 그리드 + 투명배경 (게임 엔진용) ⭐"
        file: sprite/Sprite_Illustrious_PoseGuided_Alpha_V38_api_pixel_alpha.json
        primary: true
        outputs:
          - { node_title: "Save Stage1",     label: stage1 }
          - { node_title: "Save Pixelized",  label: pixelized }
          - { node_title: "Save PixelAlpha", label: pixel_alpha, primary: true }
        defaults:
          steps: 30
          cfg: 6.5
          sampler: dpmpp_2m
          scheduler: karras
          width: 1280
          height: 640
          pose_image: pose_grid_1x3_mini_2.5h_1280x640.png
          controlnet_strength: 0.85
          negative_prompt: ${preset:NEG_PIXEL_SPRITE}
        use_cases:
          - "게임 엔진용 캐릭터 sprite (1×3 multi-view, 투명 배경, 픽셀 그리드)"
          - "RPG 도트 캐릭터 — 2.5등신 chibi 비율 강제"
          - "ControlNet OpenPose 로 정확한 좌우대칭 (front / right_side / back)"
        not_for:
          - "단일 view 일러스트 → illustration/* 사용"
          - "자유 layout 컨셉 디자인 → sprite/v36_pro_stage1"
          - "AI rembg 알파 (반투명 디테일) → sprite/rembg_alpha"
          - "흰배경 고해상도 디테일만 필요 → sprite/hires"
        tags: { kind: character, style: pixel-art, format: multi-view-1x3, output: alpha-pixel, model_family: illustrious }
        character_proportions: *sprite_pose_proportions
        prompt_template: *sprite_pose_prompt_template
        cost: { est_seconds: 45, vram_gb: 12 }
        pitfalls: *sprite_pose_pitfalls
        related:
          sibling: [sprite/hires, sprite/rembg_alpha, sprite/stage1, sprite/full]
          upstream: [sprite/v36_pro_stage1]
          downstream: []

      hires:
        description: "1920×960 디테일 보강 (흰배경)"
        file: sprite/Sprite_Illustrious_PoseGuided_Alpha_V38_api_hires.json
        outputs:
          - { node_title: "Save Stage1", label: stage1 }
          - { node_title: "Save HiRes",  label: hires, primary: true }
        defaults:
          steps: 30
          cfg: 6.5
          sampler: dpmpp_2m
          scheduler: karras
          width: 1280
          height: 640
          pose_image: pose_grid_1x3_mini_2.5h_1280x640.png
          controlnet_strength: 0.85
          negative_prompt: ${preset:NEG_PIXEL_SPRITE}
        use_cases:
          - "디테일 강조한 1920×960 multi-view 일러스트 (흰배경)"
          - "alpha 처리 필요 없고 캐릭터 시트 마케팅·홍보용"
        not_for:
          - "게임 엔진 sprite — 픽셀 그리드 정렬·투명 배경 필요 → sprite/pixel_alpha"
          - "AI rembg 알파 → sprite/rembg_alpha"
        tags: { kind: character, style: pixel-art, format: multi-view-1x3, output: hires, model_family: illustrious }
        character_proportions: *sprite_pose_proportions
        prompt_template: *sprite_pose_prompt_template
        cost: { est_seconds: 60, vram_gb: 13 }
        pitfalls: *sprite_pose_pitfalls
        related:
          sibling: [sprite/pixel_alpha, sprite/rembg_alpha, sprite/stage1, sprite/full]
          upstream: [sprite/v36_pro_stage1]
          downstream: []

      rembg_alpha:
        description: "AI rembg 알파 (일러스트용)"
        file: sprite/Sprite_Illustrious_PoseGuided_Alpha_V38_api_rembg_alpha.json
        outputs:
          - { node_title: "Save Stage1",      label: stage1 }
          - { node_title: "Save RembgAlpha",  label: rembg_alpha, primary: true }
        defaults:
          steps: 30
          cfg: 6.5
          sampler: dpmpp_2m
          scheduler: karras
          width: 1280
          height: 640
          pose_image: pose_grid_1x3_mini_2.5h_1280x640.png
          controlnet_strength: 0.85
          negative_prompt: ${preset:NEG_PIXEL_SPRITE}
        use_cases:
          - "AI rembg 알파 — 반투명 디테일 (머리카락 끝, 천 가장자리) 보존"
          - "일러스트 용도 (게임 엔진 sprite 보다 부드러운 알파)"
        not_for:
          - "게임 엔진 픽셀 정렬 sprite → sprite/pixel_alpha"
          - "흰배경 그대로 사용 → sprite/hires"
        tags: { kind: character, style: pixel-art, format: multi-view-1x3, output: alpha-rembg, model_family: illustrious }
        character_proportions: *sprite_pose_proportions
        prompt_template: *sprite_pose_prompt_template
        cost: { est_seconds: 50, vram_gb: 12 }
        pitfalls: *sprite_pose_pitfalls
        related:
          sibling: [sprite/pixel_alpha, sprite/hires, sprite/stage1, sprite/full]
          upstream: [sprite/v36_pro_stage1]
          downstream: []

      stage1:
        description: "raw 1280×640 (흰배경) — 빠른 디자인 탐색"
        file: sprite/Sprite_Illustrious_PoseGuided_Alpha_V38_api_stage1.json
        outputs:
          - { node_title: "Save Stage1", label: stage1, primary: true }
        defaults:
          steps: 30
          cfg: 6.5
          sampler: dpmpp_2m
          scheduler: karras
          width: 1280
          height: 640
          pose_image: pose_grid_1x3_mini_2.5h_1280x640.png
          controlnet_strength: 0.85
          negative_prompt: ${preset:NEG_PIXEL_SPRITE}
        use_cases:
          - "빠른 prompt 검증·디자인 iteration (Pixelize/Alpha 단계 스킵)"
          - "Stage1 결과 확인 후 다른 변형으로 재실행"
        not_for:
          - "최종 deliverable — alpha 추출 안 됨, 픽셀 그리드 정렬 안 됨"
        tags: { kind: character, style: pixel-art, format: multi-view-1x3, output: raw, model_family: illustrious }
        character_proportions: *sprite_pose_proportions
        prompt_template: *sprite_pose_prompt_template
        cost: { est_seconds: 30, vram_gb: 12 }
        pitfalls: *sprite_pose_pitfalls
        related:
