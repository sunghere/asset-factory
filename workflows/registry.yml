          scheduler: karras
          width: 1280
          height: 640
          pose_image: pose_grid_1x3_mini_2.5h_1280x640.png
          controlnet_strength: 0.85
          negative_prompt: ${preset:NEG_PIXEL_SPRITE}
        use_cases:
