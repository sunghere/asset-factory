# sprite/stage1 — V38 Alpha 빠른 prompt 검증 (raw 1280×640 흰배경).
#
# 워크플로우: Sprite_Illustrious_PoseGuided_Alpha_V38_api_stage1.json.
# Pixelize / Alpha 단계 모두 스킵 — 디자인 iteration 용.
schema_version: 1

intent: |
  Fast 1×3 character sheet iteration (raw 1280×640, white BG, no pixelize, no
  alpha). Quick prompt validation before sprite/pixel_alpha or sprite/hires.

use_cases:
  - "Fast prompt iteration / design exploration"
  - "Stage1 결과 확인 후 다른 sprite 변형으로 재실행"
  - "Quick sketch before final pixel_alpha / hires / rembg_alpha"

not_for:
  - "최종 deliverable — alpha 없음, 픽셀 정렬 없음"
  - "game engine import — use sprite/pixel_alpha"
  - "marketing high-res — use sprite/hires"

output_layout:
  kind: pose_grid
  rows: 1
  cols: 3
  per_cell_size: [426, 640]
  alpha: false
  notes: |
    1280×640 raw PNG. 1×3 grid. Pixelize / Alpha 단계 모두 스킵 — 가장 빠름.
    이 결과를 보고 디자인 락 후 pixel_alpha / hires / rembg_alpha 로 재실행.

tags:
  - pixel-art
  - sprite-sheet
  - 1x3-grid
  - controlnet-pose
  - raw
  - white-bg
  - fast-iteration
  - illustrious
  - 게임-스프라이트

prompt_template:
  base_positive: |
    pixel_character_sprite, sprite, sprite sheet, (pixel art:1.5), white background,
    1x3 pose grid layout, same character three poses,
    consistent character design, centered character,
    no scenery, no background props,
    masterpiece, best quality, very aesthetic
  base_negative: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, photorealistic, 3d, realistic, photo,
    smooth shading, anti-aliasing, smooth lines, blurred edges,
    gradient background, complex background, scenery,
    different sizes, varying scale, oversized character, height variation,
    close-up, upper body, portrait, cropped character, headshot,
    floating sword, detached weapon, levitating sword, separated weapon,
    sword in air, weapon hovering, weapon next to character, disembodied weapon
  user_slot:
    label: subject
    description: "pixel_alpha 와 같은 user_slot."
    examples:
      - "1girl, silver hair twin tails, navy school uniform, holding a notebook"
      - "1boy, brown spiky hair, blue tunic, leather belt with sword"
    required: true
    min_chars: 8
    max_chars: 400
  injection_rule: "{base_positive}, {subject}"

input_labels:
  pose_image:
    description: "ControlNet 포즈 가이드."
    alternatives:
      - pose_grid_1x3_5h_1280x640.png
      - pose_grid_1x4_1280x640.png
      - pose_grid_3x3_1280x896.png
