# sprite/v36_pro_full — V36 Pro 디자인 풀세트 (Stage1 + HiRes + Pixelized).
#
# 워크플로우: Sprite_Illustrious_Pro_V36_api_full.json. ControlNet 없는 V36 Pro 의
# 풀세트 — 컨셉 디자인 + 픽셀화 미리보기까지.
schema_version: 1

intent: |
  [V36 Pro] Full concept design pipeline (Stage1 + HiRes + Pixelized) without
  ControlNet. Decision-stage output before V37/V38 ControlNet phase.

use_cases:
  - "[V36 Pro] 컨셉 디자인 풀세트 — Stage1+HiRes+Pixelized 한 호출"
  - "디자인 결정 후 픽셀화 미리보기까지 같이"
  - "최종 출력 형태 결정 전 비교 (raw vs hires vs pixelized 선택)"

not_for:
  - "ControlNet multi-view 강제 — use sprite/full (V38) or sprite/v37_full"
  - "단일 stage 만 필요 — use sprite/v36_pro_stage1"

output_layout:
  kind: single
  rows: 1
  cols: 1
  per_cell_size: [1280, 896]
  alpha: false
  notes: |
    3 outputs: Stage1 (1280×896 raw), HiRes (1920×1344 detail), Pixelized
    (픽셀 정렬). 모두 single image (multi-view 없음). 자유 layout.

tags:
  - pixel-art
  - sprite-style
  - free-layout
  - concept-design
  - all-outputs
  - v36-pro
  - illustrious
  - 컨셉-디자인

prompt_template:
  base_positive: |
    pixel_character_sprite, sprite art, (pixel art:1.5), white background,
    chibi, sd character, full body,
    masterpiece, best quality, very aesthetic
  base_negative: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, photorealistic, 3d, realistic, photo,
    smooth shading, anti-aliasing,
    gradient background, complex background, scenery,
    floating sword, detached weapon, levitating sword, separated weapon,
    sword in air, weapon hovering
  user_slot:
    label: subject
    description: "v36_pro_stage1 과 같은 user_slot. ControlNet 없어 포즈 자유."
    examples:
      - "1girl, silver hair, blue dress, standing pose, smiling"
      - "1boy, knight armor, holding sword, heroic pose"
      - "1girl, magical girl, twirling, sparkles around"
    required: true
    min_chars: 8
    max_chars: 400
  injection_rule: "{base_positive}, {subject}"
