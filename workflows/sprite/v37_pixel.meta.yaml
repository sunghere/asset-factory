# sprite/v37_pixel — V37 PoseGuided pixelized only (alpha 단계 없음).
#
# 워크플로우: Sprite_Illustrious_PoseGuided_V37_api_pixel.json.
# V37 = ControlNet 단계 도입. V38 의 alpha 추출 단계가 없는 이전 버전.
schema_version: 1

intent: |
  [V37] 1×3 pixelized character sheet (white BG, no alpha). V38 의 WAS alpha
  노드를 우회하고 픽셀 정렬만 필요할 때.

use_cases:
  - "픽셀 그리드 정렬된 흰배경 multi-view (alpha 추출 없이 빠르게)"
  - "alpha 처리를 사용자가 직접 (Photoshop / 외부 tool) 하고 싶을 때"
  - "V38 의 WAS rembg mode 가 unfit 한 케이스 (사용자 caching)"

not_for:
  - "투명 배경 sprite — use sprite/pixel_alpha (V38)"
  - "AI rembg alpha — use sprite/rembg_alpha"
  - "흰배경 그대로 사용 가능하면 — use sprite/hires"

output_layout:
  kind: pose_grid
  rows: 1
  cols: 3
  per_cell_size: [426, 640]
  alpha: false
  notes: |
    1280×640 PNG with pixel grid alignment, white BG. V38 와 동일 픽셀화 단계,
    alpha 추출 단계만 빠짐.

tags:
  - pixel-art
  - sprite-sheet
  - 1x3-grid
  - controlnet-pose
  - pixelized
  - white-bg
  - v37
  - illustrious
  - 게임-스프라이트

prompt_template:
  base_positive: |
    pixel_character_sprite, sprite, sprite sheet, (pixel art:1.5), white background,
    1x3 pose grid layout, same character three poses,
    consistent character design, sharp pixel edges, limited palette,
    centered character, no scenery, no background props,
    masterpiece, best quality, very aesthetic
  base_negative: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, photorealistic, 3d, realistic, photo,
    smooth shading, anti-aliasing, smooth lines, blurred edges,
    gradient background, complex background, scenery,
    different sizes, varying scale, oversized character, height variation,
    close-up, upper body, portrait, cropped character, headshot,
    floating sword, detached weapon, levitating sword, separated weapon,
    sword in air, weapon hovering, weapon next to character, disembodied weapon
  user_slot:
    label: subject
    description: "pixel_alpha 와 같은 user_slot."
    examples:
      - "1girl, silver hair twin tails, navy school uniform, holding a notebook"
      - "1boy, brown spiky hair, blue tunic, leather belt with sword"
    required: true
    min_chars: 8
    max_chars: 400
  injection_rule: "{base_positive}, {subject}"

input_labels:
  pose_image:
    description: "ControlNet 포즈 가이드."
    alternatives:
      - pose_grid_1x3_5h_1280x640.png
      - pose_grid_1x4_1280x640.png
      - pose_grid_3x3_1280x896.png
