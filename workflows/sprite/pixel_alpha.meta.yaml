# sprite/pixel_alpha 디스커버리 메타 (spec docs/NEXT.md §1.A 첫 변형 시범).
#
# - intent / use_cases / not_for: 변형 선택 가이드
# - output_layout: 출력 형태 (1×3 pose grid, transparent BG)
# - tags: 검색용 태그 (§C 룰 기반 매칭)
# - prompt_template: subject-injection 모드 (§B). base_negative 는 registry.yml
#   의 NEG_PIXEL_SPRITE preset 과 동일 — 검 떠다님 negative 8개 키워드 포함
#   (HANDOFF §5.4).
# - input_labels.pose_image: ControlNet 포즈 가이드 alternatives 명시
schema_version: 1

intent: |
  3-pose character sheet (1×3 grid, transparent BG) for 2D game engine import.

use_cases:
  - "RPG character with idle / walk-side / walk-front 3-pose set"
  - "Top-down RPG sprite atlas seed (one row of poses, alpha-cut)"
  - "Card-game character sprite with consistent design across 3 angles"

not_for:
  - "single character portrait — use illustration/animagine_hires"
  - "scene/background — use pixel_bg/*"
  - "logo or app icon — use icon/flat"
  - "character with varying scale/age/outfit between cells"

output_layout:
  kind: pose_grid
  rows: 1
  cols: 3
  per_cell_size: [426, 640]
  alpha: true
  notes: |
    Output is a single 1280×640 PNG with alpha. Each cell is one pose;
    consumers split by `pose_image` template grid lines. Left-side view 는
    SDXL/Illustrious 가 좌측 옆모습 학습 약함 — 게임 엔진에서 flipX 권장
    (HANDOFF §5.3).

tags:
  - pixel-art
  - transparent-bg
  - pose-sheet
  - controlnet-pose
  - 1x3-grid
  - rpg-character
  - 2d-game-asset
  - chibi
  - illustrious
  - 게임-스프라이트
  - 픽셀-캐릭터

prompt_template:
  # base_positive: 워크플로우 의도를 prompt 에 강제 — pixel_character_sprite_illustrious
  # LoRA 트리거 (`pixel_character_sprite, sprite, sprite sheet, (pixel art:1.5),
  # white background`) + 1×3 multi-view 강제 키워드. <lora:...:0.7> syntax 는
  # 워크플로우 JSON 의 LoRA 노드와 이중 로드되어 제외.
  base_positive: |
    pixel_character_sprite, sprite, sprite sheet, (pixel art:1.5), white background,
    1x3 pose grid layout, same character three poses,
    consistent character design, sharp pixel edges, limited palette,
    centered character, no scenery, no background props,
    masterpiece, best quality, very aesthetic
  # base_negative: registry.yml 의 NEG_PIXEL_SPRITE preset 과 동일.
  # 검 떠다님 회피 키워드 8개 (floating sword, detached weapon, ...) 포함 — HANDOFF §5.4.
  # ControlNet stick figure 가 등신 결정하는 점 + 1×3 multi-view full-body 강제
  # (close-up/upper body 차단) — HANDOFF §5.2/5.3.
  base_negative: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, photorealistic, 3d, realistic, photo,
    smooth shading, anti-aliasing, smooth lines, blurred edges,
    gradient background, complex background, scenery,
    different sizes, varying scale, oversized character, height variation,
    close-up, upper body, portrait, cropped character, headshot,
    floating sword, detached weapon, levitating sword, separated weapon,
    sword in air, weapon hovering, weapon next to character, disembodied weapon
  user_slot:
    label: subject
    description: |
      캐릭터 묘사만 (외형 / 복장 / 무기 / 액션). 스타일·구도·배경 묘사 금지 —
      base_positive 가 처리. (chibi:1.4) 같은 chibi 가중치 강조 금지 — ControlNet
      stick figure 가 등신 결정 (HANDOFF §5.2/5.5). 검 든 캐릭터는 동사 묶기 권장:
      "(holding silver sword:1.3), sword in right hand, gripping sword tightly".
    examples:
      - "1girl, silver hair twin tails, navy school uniform, holding a notebook"
      - "1boy, brown spiky hair, blue tunic, leather belt with sword"
      - "1girl, (black hair:1.2), (side ponytail:1.3), long hair, blue knight armor, (holding silver sword:1.3), sword in right hand, gripping sword tightly, red cape, fantasy warrior"
    required: true
    min_chars: 8
    max_chars: 400
  injection_rule: "{base_positive}, {subject}"

input_labels:
  pose_image:
    description: |
      ControlNet 포즈 가이드. 1×3 그리드 PNG. 같은 카테고리의 다른 grid 로
      교체하면 출력 레이아웃이 grid 에 맞춰 바뀐다 (예: 1×4 시트, 3×3 액션 시트).
      등신은 stick figure 의 y 좌표가 결정 — 2.5h (mini chibi) 가 default.
    alternatives:
      - pose_grid_1x3_5h_1280x640.png        # 더 큰 캐릭터 비율 (5등신)
      - pose_grid_1x4_1280x640.png           # 4-pose
      - pose_grid_3x3_1280x896.png           # 9-pose 액션 시트
