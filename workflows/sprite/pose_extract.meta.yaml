# sprite/pose_extract — DWPose stick figure 추출 (utility).
#
# 워크플로우: PoseExtract_V37_api.json. 입력 이미지에서 OpenPose stick figure 추출.
# ControlNet 입력으로 재사용 가능 — V37/V38 ControlNet 변형의 upstream.
schema_version: 1

intent: |
  Utility: extract OpenPose stick figure from a source image. Output is a
  ControlNet-ready pose grid for downstream sprite/* (V37/V38) variants.

use_cases:
  - "기존 캐릭터 이미지에서 포즈 추출 → ControlNet 입력으로 재사용"
  - "V36 Pro 컨셉 디자인 → V37/V38 ControlNet 단계 전환 (HANDOFF §5.6)"
  - "사용자 업로드 이미지의 포즈를 sprite 변형으로 chain"

not_for:
  - "캐릭터 생성 자체 — utility 만 (포즈 추출 only)"
  - "prompt 기반 작업 — source_image 입력 전용"
  - "이미 1×3 grid pose 가 있으면 사용 불필요 — 직접 V37/V38 호출"

output_layout:
  kind: single
  rows: 1
  cols: 1
  per_cell_size: null
  alpha: false
  notes: |
    OpenPose stick figure PNG (단색 + skeleton). 입력 이미지 해상도 따라감.
    이 결과를 sprite/pixel_alpha 등의 pose_image 입력으로 사용.

tags:
  - utility
  - pose-extraction
  - controlnet-input
  - dwpose
  - openpose
  - 유틸리티

prompt_template: ~  # utility — prompt 사용 안 함 (DWPose 추출만)

input_labels:
  source_image:
    description: |
      포즈 추출할 원본 이미지. 단일 캐릭터 또는 multi-view 모두 지원 — 결과
      stick figure 의 layout 이 원본 따라감. PR #14 의 동적 입력 업로드로
      전달 (`--input source_image=@./pose.png` 또는 `asset:<id>`).
    alternatives: []
