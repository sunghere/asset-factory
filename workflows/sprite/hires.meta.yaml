# sprite/hires — V38 Alpha 1920×960 디테일 보강 (흰배경, alpha X).
#
# 워크플로우: Sprite_Illustrious_PoseGuided_Alpha_V38_api_hires.json.
# pixel_alpha 와 같은 ckpt/LoRA — 차이는 출력 (HiRes 흰배경 / alpha X).
schema_version: 1

intent: |
  High-detail 1×3 character sheet (1920×960, white BG, no alpha) for marketing
  /promo use. pixel_alpha 와 같은 sprite family 의 흰배경 hires 변형.

use_cases:
  - "Marketing key art with detailed 1×3 character sheet (white BG)"
  - "Promo screenshot before alpha extraction (designer review)"
  - "High-detail reference for 2D animator (white BG 그대로 사용)"

not_for:
  - "game engine import — alpha 가 필요. use sprite/pixel_alpha"
  - "AI rembg alpha — use sprite/rembg_alpha"
  - "fast iteration / design exploration — use sprite/stage1"
  - "single character portrait — use illustration/animagine_hires"

output_layout:
  kind: pose_grid
  rows: 1
  cols: 3
  per_cell_size: [640, 960]
  alpha: false
  notes: |
    1920×960 PNG. 1×3 grid (front / right_side / back). 흰배경 그대로 — alpha
    추출은 sprite/pixel_alpha 또는 sprite/rembg_alpha 사용. Left-side flipX
    권장 (HANDOFF §5.3).

tags:
  - pixel-art
  - sprite-sheet
  - 1x3-grid
  - controlnet-pose
  - hires
  - white-bg
  - rpg-character
  - illustrious
  - 게임-스프라이트
  - 마케팅

prompt_template:
  base_positive: |
    pixel_character_sprite, sprite, sprite sheet, (pixel art:1.5), white background,
    1x3 pose grid layout, same character three poses,
    consistent character design, sharp pixel edges, limited palette,
    centered character, no scenery, no background props, highly detailed,
    masterpiece, best quality, very aesthetic
  base_negative: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, photorealistic, 3d, realistic, photo,
    smooth shading, anti-aliasing, smooth lines, blurred edges,
    gradient background, complex background, scenery,
    different sizes, varying scale, oversized character, height variation,
    close-up, upper body, portrait, cropped character, headshot,
    floating sword, detached weapon, levitating sword, separated weapon,
    sword in air, weapon hovering, weapon next to character, disembodied weapon
  user_slot:
    label: subject
    description: |
      캐릭터 묘사만 (외형/복장/무기/액션). 스타일·구도·배경 묘사 금지.
      pixel_alpha 와 같은 user_slot — chibi 가중치 강조 금지 (HANDOFF §5.2),
      검 든 캐릭터는 동사 묶기.
    examples:
      - "1girl, silver hair twin tails, navy school uniform, holding a notebook"
      - "1boy, brown spiky hair, blue tunic, leather belt with sword"
      - "1girl, (black hair:1.2), (side ponytail:1.3), long hair, blue knight armor, (holding silver sword:1.3), sword in right hand, gripping sword tightly, red cape, fantasy warrior"
    required: true
    min_chars: 8
    max_chars: 400
  injection_rule: "{base_positive}, {subject}"

input_labels:
  pose_image:
    description: |
      ControlNet 포즈 가이드. 1×3 그리드 PNG. pixel_alpha 와 같은 alternatives 사용.
    alternatives:
      - pose_grid_1x3_5h_1280x640.png
      - pose_grid_1x4_1280x640.png
      - pose_grid_3x3_1280x896.png
