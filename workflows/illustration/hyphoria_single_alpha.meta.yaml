# illustration/hyphoria_single_alpha — Hyphoria 일러스트 single + alpha 변형.
#
# 워크플로우: B4_Hyphoria_V36_api_single_alpha.json. ckpt: hyphoria_v002 (Illustrious).
# hyphoria_stage1 베이스 + WAS rembg(Image Rembg (Remove Background), isnet-general-use
# semantic segmentation) → Save Alpha 노드 (GGU-609: threshold-based Color BG Remove
# → isnet-general-use 교체, warm-paper hue mismatch 해결).
# 한 호출에 raw stage1 + alpha 두 출력. warm-paper / personal-ritual 톤의
# hero illustration·object 자산을 alpha 배경으로 납품할 때 사용.
schema_version: 1

intent: |
  Single-object hero illustration with transparent alpha background, in
  warm-paper / personal-ritual / cozy-illustration tone (e.g., paper time
  capsule, wax seal, journal stamp). Hyphoria base provides soft painterly
  shading distinct from flat-icon/vector style.

use_cases:
  - "Hero illustration for ritual / cozy product surface (time capsule, journal)"
  - "Object illustration on warm-paper background, delivered with alpha for compositing"
  - "Single-subject decorative stamp / seal / token in painterly anime tone"

not_for:
  - "complex multi-character scene — use illustration/hyphoria_hires (no alpha)"
  - "character sprite — use sprite/pixel_alpha"
  - "flat / vector UI icon — use icon/flat (different prompt template)"
  - "scene / background — use pixel_bg/* or illustration/*_hires"
  - "high-resolution deliverable >1024 — needs hires variant follow-up"

output_layout:
  kind: single
  rows: 1
  cols: 1
  per_cell_size: [1024, 1024]
  alpha: true
  notes: |
    1024×1024 single subject. Stage1 (raw, white background) + Alpha
    (WAS rembg foreground extraction) 두 출력. Alpha 가 primary —
    합성·UI 배치용. Stage1 은 fallback / 디버깅용 raw.

tags:
  - illustration
  - hyphoria
  - illustrious
  - single
  - alpha-bg
  - warm-paper
  - cozy
  - hero
  - object
  - 1024x1024
  - 일러스트
  - 알파

prompt_template:
  # base_positive: warm-paper / single-object 톤 강제 + 흰배경 강제 (alpha 추출 위해).
  # icon/flat 와 달리 "flat icon, vector style" 미사용 — painterly / illustration 유지.
  base_positive: |
    warm paper texture illustration, single object, isolated subject,
    white background, soft lighting, painterly shading,
    masterpiece, best quality, very aesthetic
  # base_negative: NEG_ILLUSTRATION + alpha 추출 실패 패턴 (complex BG, scenery) 차단.
  base_negative: |
    (worst quality, low quality:1.4), blurry, jpeg artifacts, deformed, bad anatomy,
    watermark, text, signature, extra fingers, mutated hands,
    complex background, scenery, landscape, multiple objects, busy,
    gradient sky, photorealistic, 3d render
  user_slot:
    label: subject
    description: |
      단일 오브젝트/주체 묘사 (재질 / 색상 / 질감 / 분위기). 배경·구도·
      "warm paper" / "illustration" 단어는 base_positive 에 박혀 있어 다시
      쓸 필요 없음. 캐릭터 군중·복잡한 장면은 not_for.
    examples:
      - "paper time capsule, kraft texture, wax-sealed lid, slight shadow"
      - "wax seal stamp, deep rose, embossed flower motif"
      - "vintage journal page, handwritten ink, pressed flower"
      - "ribbon-tied parchment scroll, aged paper, calligraphy"
    required: true
    min_chars: 5
    max_chars: 300
  injection_rule: "{base_positive}, {subject}"
